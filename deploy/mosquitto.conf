# ContrailCast RMS health broker -- Mosquitto configuration.
#
# Design: an open, unauthenticated ingest broker whose ACL confines everyone to
# the stations/# namespace, hardened with resource limits and TLS. Anonymous
# read+write is intentional (any RMS operator can publish with zero credentials);
# the protections here are the ones that DON'T add client friction.
#
# Install to /etc/mosquitto/conf.d/contrailcast.conf  (see deploy/README.md)

per_listener_settings true

# --- Plaintext listener -----------------------------------------------------
# Kept during migration so older clients keep working. Remove this whole block
# once every station is on 8883.
listener 1883
allow_anonymous true
acl_file /etc/mosquitto/aclfile

# --- TLS listener -----------------------------------------------------------
listener 8883
allow_anonymous true
acl_file /etc/mosquitto/aclfile
# Let's Encrypt cert for mqtt.contrailcast.com. mosquitto must be able to read
# these (see the certbot deploy-hook in deploy/README.md).
certfile /etc/mosquitto/certs/fullchain.pem
keyfile  /etc/mosquitto/certs/privkey.pem
tls_version tlsv1.2

# --- Resource limits (shrink the DoS / abuse surface; clients never notice) -
message_size_limit 65536          # our payloads are ~1-2 KB; 64 KB is generous
max_connections 1000
max_inflight_messages 20
max_queued_messages 100
max_keepalive 120
persistent_client_expiration 1h   # reap abandoned sessions and their retained refs

# --- Persistence / logging --------------------------------------------------
persistence true
persistence_location /var/lib/mosquitto/
autosave_interval 300
log_dest syslog
log_type warning
log_type error
log_type notice
