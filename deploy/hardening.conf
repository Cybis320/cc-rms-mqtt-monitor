# ContrailCast RMS health broker -- ADDITIVE hardening.
#
# These are resource limits to ADD to an EXISTING Mosquitto install. They are
# NOT a standalone config -- do not drop this in as a new file with its own
# listener/persistence.
#
# A normal mosquitto install already defines persistence, persistence_location,
# log_dest, and a `listener` (in the base /etc/mosquitto/mosquitto.conf and/or
# an existing conf.d file). Re-declaring `persistence_location`, or a second
# `listener` on a port already in use, is a duplicate-value / duplicate-listener
# error that crash-loops the service. So:
#
#   * Do NOT add persistence / persistence_location / log_dest here -- the base
#     config already provides them.
#   * Do NOT add `per_listener_settings true` -- it only matters with multiple
#     listeners that have different security, and it re-scopes allow_anonymous /
#     acl_file globally. You have one listener; leave it off.
#   * Do NOT create a second conf.d file with its own `listener 1883`.
#
# Apply by APPENDING these six (global) lines to the conf.d file that already
# defines the stations listener, after confirming none are already set elsewhere
# (a duplicate of any of these is also a crash-loop risk):

message_size_limit 65536          # payloads are ~1-2 KB; 64 KB is generous
max_connections 1000
max_inflight_messages 20
max_queued_messages 100
max_keepalive 120
persistent_client_expiration 1h   # reap abandoned sessions + their retained refs

# The actual security feature is the namespace ACL, which lives on the existing
# listener -- this file does not redefine it. Make sure the listener still has:
#     allow_anonymous true
#     acl_file /etc/mosquitto/aclfile      # see deploy/aclfile: topic readwrite stations/#
