# CC RMS MQTT monitor configuration.
# Every value shown is the default; delete anything you do not need to change.
# Copy to config.yaml and pass with: cc-rms-monitor --config config.yaml

broker:
  host: mqtt.contrailcast.com
  port: 1883              # plaintext; the open health feed carries no secrets
  username: null          # broker is open (anonymous); no credentials needed
  password: null
  tls: false              # opt-in. Enable (tls: true, port: 8883) only when you
                          # add authentication or transmit sensitive data --
                          # see deploy/README.md.
  keepalive: 60
  client_id_prefix: cc-rms-monitor

# How stations are discovered:
#   multicam  -> one station per <stations_dir>/*/.config
#   single-cam-> falls back to <rms_dir>/.config when stations_dir is empty
stations_dir: ~/source/Stations
rms_dir: ~/source/RMS

# Topic layout. The contrailcast broker ACL only allows the "stations/#"
# namespace, so the prefix must stay inside it:
#   <topic_prefix>/<host>/status      retained online/offline (Last Will)
#   <topic_prefix>/<host>/health      retained host (OS) JSON state blob
#   <topic_prefix>/<station>/health   retained per-station JSON state blob
topic_prefix: stations

# Alerting is via a broker-side ntfy + Telegram consumer of the
# stations/<id>/health topics.

interval_seconds: 60
log_tail_lines: 4000
host_name: null           # defaults to the system hostname

# Maintenance detection: records get maintenance:true (so the bridge mutes alerts
# for expected disruption) when the host just rebooted or an RMS updater process
# is actually running. Self-healing: a lingering lock/flag file never implies
# maintenance on its own (it's verified against the live updater process, cleared
# on boot, and time-bounded) so a marker left behind by a reboot can't stick.
boot_grace_s: 600                  # treat the first 10 min after boot as "booting"
maintenance_file_max_age_s: 900    # sane update window (15 min); older = stale
maintenance_file: null             # optional GRMSUpdater lock path to clean up

# Subscription-group OVERRIDE (the installer asks and sets this). When set it
# applies to every station on this host; when null, each station uses its own
# RMS camera_group_name. Subscribers use <slug-of-group> (the same handle on
# ntfy and Telegram).
group: null

# Health checks to silence (by key), e.g. [dropped_frames, upload_backlog].
# Empty = all on. Keys: capture_down, capture_stalled, detection_stalled,
# timelapse_missing, timelapse_overdue, log_fatal, log_warning, watchdog,
# disk_low, upload_backlog, clock_unsynced, clock_uncertainty, dropped_frames,
# oom, host_memory, udp_rcvbuf_errors, nic_errors, cpu_pressure.
disabled_checks: []

# Dropped-frame attribution: each station record carries a drop_cause /
# drop_confidence / drop_detail derived by elimination from cheap signals --
# CPU/I-O back-pressure (buffer fill, host CPU/iowait, capture CPU%), the network
# layers with their own counters (kernel UDP buffer, NIC RX errors, IP reassembly),
# and in-pipeline decoder corruption with a clean host (the camera/link case).
# When a station drops frames the host signals can't explain, the monitor
# self-escalates to a heavy on-demand probe (ffprobe keyframe peak + camera ping)
# to confirm -- rate-limited and backed off per station so a persistently-bad
# camera is never re-hammered (important on a Pi). Set false to only run the
# heavy probe manually via `cc-rms-monitor --diagnose [STATION]`.
enable_adaptive_probe: true

# Extra WARNING-level log lines to NOT alert on (regex, matched against the
# line). Added to the built-in benign defaults: ExtractStars "Too many candidate
# stars", numpy/scipy *Warning:, the observation-summary lock race, and
# alignPlatepar non-convergence. Example:
#   log_warning_ignore: ["Local file not found"]
log_warning_ignore: []

thresholds:
  output_fresh_error_s: 300    # error if no output (FF at night / frames by day)
                               # for this long; generous to ride mode switches
  capture_active_window_s: 3600
  detection_grace_s: 1800
  timelapse_grace_s: 3600      # 1h grace before flagging a session's missing mp4
                               # (encoding is slow on weak multicam machines)
  timelapse_max_age_s: 108000  # 30h; flag if no mp4 at all while saving frames
  disk_free_warn_gb: 20
  disk_free_error_gb: 5
  upload_queue_warn: 10        # queue is normally 0 (drains each morning);
                               # ~4 files/camera/night accumulate when uploads fail
  clock_error_warn_ms: 100
  dropped_frames_warn: 10      # dropped frames per 10 min before warning
  mem_available_warn_mb: 800   # host RAM headroom (OOM early warning)
  mem_available_error_mb: 300

  # --- Dropped-frame attribution (classify_drops) + adaptive probe ---
  # These tune which cause a drop is pinned on, and whether it's host-explained
  # (no probe) or worth escalating. They don't change alert SEVERITY.
  buffer_fill_warn_pct: 70       # appsink this full => RMS consumer back-pressure
  capture_cpu_warn_pct: 250      # capture process-tree CPU% (sums across cores)
  cpu_busy_warn_pct: 90          # host CPU saturated (back-pressure)
  cpu_iowait_warn_pct: 20        # host blocked on disk I/O (write back-pressure)
  load_per_core_warn: 2.0        # run-queue >> cores
  nic_rx_errors_per_min_warn: 0  # NIC RX errors climbing => wire/cable/duplex
  ip_reasm_fails_per_min_warn: 0 # IP fragment-reassembly drops climbing
  decoder_errors_warn: 1         # in-log decoder/concealment errors (upstream loss)
  pipeline_reconnects_warn: 3    # rtspsrc reconnect churn in the scanned tail
  ping_loss_warn_pct: 1.0        # probed sustained loss to the camera
  probe_min_interval_s: 600      # min gap between escalated probes per station
  probe_max_interval_s: 3600     # backoff ceiling while a camera stays bad
