# CC RMS MQTT monitor configuration.
# Every value shown is the default; delete anything you do not need to change.
# Copy to config.yaml and pass with: cc-rms-monitor --config config.yaml

broker:
  host: mqtt.contrailcast.com
  port: 1883              # plaintext; the open health feed carries no secrets
  username: null          # broker is open (anonymous); no credentials needed
  password: null
  tls: false              # opt-in. Enable (tls: true, port: 8883) only when you
                          # add authentication or transmit sensitive data --
                          # see deploy/README.md.
  keepalive: 60
  client_id_prefix: cc-rms-monitor

# How stations are discovered:
#   multicam  -> one station per <stations_dir>/*/.config
#   single-cam-> falls back to <rms_dir>/.config when stations_dir is empty
stations_dir: ~/source/Stations
rms_dir: ~/source/RMS

# Topic layout. The contrailcast broker ACL only allows the "stations/#"
# namespace, so the prefix must stay inside it:
#   <topic_prefix>/<host>/status      retained online/offline (Last Will)
#   <topic_prefix>/<host>/health      retained host (OS) JSON state blob
#   <topic_prefix>/<station>/health   retained per-station JSON state blob
topic_prefix: stations

# Alerting is via a broker-side ntfy + Telegram consumer of the
# stations/<id>/health topics.

interval_seconds: 60
log_tail_lines: 4000
host_name: null           # defaults to the system hostname

# Subscription group for the alert bridge. The PRIMARY source is each station's
# `camera_group_name` in its RMS .config (read automatically). This value is only
# a FALLBACK, applied to stations whose camera_group_name is unset ("none").
group: null

# Health checks to silence (by key), e.g. [dropped_frames, upload_backlog].
# Empty = all on. Keys: capture_down, capture_stalled, detection_stalled,
# log_fatal, watchdog, disk_low, upload_backlog, clock_unsynced,
# clock_uncertainty, dropped_frames, oom, host_memory.
disabled_checks: []

thresholds:
  output_fresh_error_s: 300    # error if no output (FF at night / frames by day)
                               # for this long; generous to ride mode switches
  capture_active_window_s: 3600
  detection_grace_s: 1800
  disk_free_warn_gb: 20
  disk_free_error_gb: 5
  upload_queue_warn: 50
  clock_error_warn_ms: 100
  mem_available_warn_mb: 800   # host RAM headroom (OOM early warning)
  mem_available_error_mb: 300
